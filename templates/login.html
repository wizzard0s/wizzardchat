<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>WizzardChat – Sign in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/wizzardchat.css" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0d1117; }
        .login-card { width: 100%; max-width: 380px; }
    </style>
</head>
<body>
<div class="login-card p-4">
    <div class="text-center mb-4">
        <i class="bi bi-chat-dots-fill text-primary" style="font-size:2.5rem;"></i>
        <h4 class="mt-2 fw-bold">WizzardChat</h4>
        <p class="text-secondary small">Sign in to your account</p>
    </div>

    <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

    <form id="loginForm" novalidate>
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" autocomplete="username" autofocus required>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100" id="btnLogin">
            <span id="btnText">Sign in</span>
            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-1" role="status"></span>
        </button>
    </form>
</div>

<script>
'use strict';
(async function () {
    const params = new URLSearchParams(location.search);
    const next   = params.get('next') || '/';

    // Already logged in? Trust the stored token and redirect.
    // If the token is actually expired, the destination page will catch a 401 and send back here.
    const tok = localStorage.getItem('wizzardchat_token');
    if (tok) { location.replace(next); return; }

    const form    = document.getElementById('loginForm');
    const errBox  = document.getElementById('errorAlert');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('btnSpinner');

    function setLoading(on) {
        document.getElementById('btnLogin').disabled = on;
        btnText.textContent = on ? 'Signing in…' : 'Sign in';
        spinner.classList.toggle('d-none', !on);
    }

    form.addEventListener('submit', async e => {
        e.preventDefault();
        errBox.classList.add('d-none');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) {
            errBox.textContent = 'Please enter your username and password.';
            errBox.classList.remove('d-none');
            return;
        }

        setLoading(true);
        try {
            const body = new URLSearchParams({ username, password });
            const res  = await fetch('/api/v1/auth/login', {
                method:  'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body,
            });
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('wizzardchat_token', data.access_token);
                location.replace(next);
            } else {
                const err = await res.json().catch(() => ({}));
                errBox.textContent = err.detail || 'Invalid username or password.';
                errBox.classList.remove('d-none');
            }
        } catch {
            errBox.textContent = 'Could not reach the server. Please try again.';
            errBox.classList.remove('d-none');
        } finally {
            setLoading(false);
        }
    });
})();
</script>
</body>
</html>
